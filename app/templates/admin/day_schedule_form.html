{% extends 'admin/layout.html' %}{% from 'macros.html' import render_field %}{% block admin_content %}
<h1>Add Day Schedule: {{ program.title }}</h1>
<form method="post" class="form-card">
  {{ form.hidden_tag() }}
  {{ render_field(form.title) }}
  {{ render_field(form.date) }}
  {{ render_field(form.description) }}
  <button class="btn">Save Schedule</button>
</form>
{% endblock %}
