{% extends 'admin/layout.html' %}{% block admin_content %}<div class="section-head"><h1>Admin Users</h1><a class="btn" href="{{ url_for('admin.create_user') }}">Add Admin</a></div><table><tr><th>Name</th><th>Email</th><th>Admin</th></tr>{% for u in users %}<tr><td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ 'Yes' if u.is_admin else 'No' }}</td></tr>{% endfor %}</table>{% endblock %}
